name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Build Directory
      run: mkdir -p build

    - name: Typecheck Swift Sources
      run: |
        swift_sources=()
        while IFS= read -r source_file; do
          swift_sources+=("$source_file")
        done < <(find NetSpeedMonitor -name '*.swift' | sort)
        swiftc -typecheck "${swift_sources[@]}"

    - name: Run Tests
      run: ./test.sh

    - name: Build App Bundle
      run: ./build.sh --no-launch

    - name: Verify Signature
      run: codesign -dv --verbose=2 "dist/NetSpeedMonitor.app"

    - name: Sanitize Metadata
      run: |
        xattr -cr "dist/NetSpeedMonitor.app"
        xattr -r -d com.apple.quarantine "dist/NetSpeedMonitor.app" || true
        xattr -r -d com.apple.metadata:kMDItemWhereFroms "dist/NetSpeedMonitor.app" || true
        plutil -replace CFBundleSupportedPlatforms -json '["MacOSX"]' \
          "dist/NetSpeedMonitor.app/Contents/Info.plist"

    - name: Create Distribution Package
      run: |
        mkdir -p build/Release
        rm -rf build/Release/NetSpeedMonitor.app
        cp -R dist/NetSpeedMonitor.app build/Release/
        cd build/Release
        ditto -c -k --keepParent NetSpeedMonitor.app NetSpeedMonitor.zip
        shasum -a 256 NetSpeedMonitor.zip > NetSpeedMonitor.sha256

    - name: Upload Artifacts (Master)
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: universal-build-${{ github.sha }}
        path: |
          build/Release/NetSpeedMonitor.zip
          build/Release/NetSpeedMonitor.sha256

    - name: Create Release Draft
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        body_path: RELEASE_NOTES.md
        files: |
          build/Release/NetSpeedMonitor.zip
          build/Release/NetSpeedMonitor.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
